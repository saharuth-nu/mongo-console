services:

  # ── MongoDB (built-in — comment out if using external MongoDB) ───────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Elasticsearch (optional — comment out if using external ES) ──────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - mongo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6

  # ── Mongo Console (Next.js app) ───────────────────────────────────────────────
  mongo-console:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_PATH: /db-console   # ← baked into Next.js at build time
    image: saharuth20/mongo-console:v1.0.0
    container_name: mongo-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Comma-separated URIs — format: label|uri,label|uri  OR just  uri,uri
      # Examples:
      #   Same compose:        Local|mongodb://mongo:27017/?authSource=admin
      #   External network:    Prod|mongodb://mongo-prod:27017/?authSource=admin
      #   Host port (Linux):   Local|mongodb://172.17.0.1:27017/?authSource=admin
      #   Host port (Mac/Win): Local|mongodb://host.docker.internal:27017/?authSource=admin
      #   Remote server:       Remote|mongodb://192.168.1.100:27017/?authSource=admin
      #   Atlas:               Atlas|mongodb+srv://cluster.mongodb.net/?authSource=admin
      MONGODB_URI: >-
        Local|mongodb://mongo:27017/?authSource=admin
      # Elasticsearch node(s) — leave blank to connect via the ES Connect UI
      # ELASTICSEARCH_URI: Local|http://elasticsearch:9200
    networks:
      - mongo-net
    depends_on:
      mongo:
        condition: service_healthy

networks:
  mongo-net:
    # Change to 'external: true' if MongoDB runs in a separate compose stack
    # and you have created the network manually with: docker network create mongo-net
    driver: bridge
    # external: true

volumes:
  mongo_data:
  es_data:
