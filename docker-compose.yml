services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Console (Next.js app) ───────────────────────────────────────────────
  mongo-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mongo-console
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Comma-separated list of MongoDB URIs (no credentials — enter via UI)
      # Format: label|uri,label|uri   OR just   uri,uri
      MONGODB_URI: >-
        Local|mongodb://mongo:27017/?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
